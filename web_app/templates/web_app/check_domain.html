{% extends "web_app/base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto animate-in fade-in slide-in-from-bottom-8 duration-1000">
    <div class="glass-module luminous-cyan p-10 relative overflow-hidden">
        <!-- Background Decoration -->
        <div class="absolute inset-0 opacity-5 pointer-events-none" style="background-image: radial-gradient(circle, #00dbe7 1px, transparent 1px); background-size: 24px 24px;"></div>
        
        <div class="relative z-10 flex flex-col items-center text-center">
            <span class="material-symbols-outlined text-primary text-5xl mb-6 drop-shadow-[0_0_10px_rgba(0,219,231,0.5)]">radar</span>
            <div class="space-y-1 mb-10">
                <span class="font-headline text-[10px] tracking-[0.3em] text-primary/60 uppercase">Protocol: MCA_DNS_OSINT_PROBE</span>
                <h2 class="font-headline text-3xl font-bold text-primary italic uppercase tracking-tighter">OSINT_PROBE_LAUNCHER</h2>
            </div>

            <form method="POST" id="domainForm" class="w-full space-y-8 text-left">
                {% csrf_token %}
                <div class="space-y-2">
                    <label class="font-headline text-[10px] tracking-widest text-primary/60 uppercase ml-1 flex items-center gap-2">
                        <span class="w-1.5 h-1.5 bg-primary rounded-full"></span>
                        [01] TARGET_COMPANY_NAME
                    </label>
                    <input type="text" id="company_name" name="company_name" placeholder="E.G. ZORVYN FINTECH PVT LTD" required
                           class="w-full bg-black/40 border border-white/10 p-4 text-white font-mono text-sm focus:border-primary/50 focus:outline-none transition-all placeholder:text-on-surface-variant/30">
                </div>
                
                <div class="space-y-2">
                    <label class="font-headline text-[10px] tracking-widest text-primary/60 uppercase ml-1 flex items-center gap-2">
                        <span class="w-1.5 h-1.5 bg-primary/40 rounded-full"></span>
                        [02] TARGET_DOMAIN_URL (OPTIONAL)
                    </label>
                    <div class="relative">
                        <input type="text" id="company_domain" name="company_domain" placeholder="E.G. ZORVYNFINTECH.COM"
                               class="w-full bg-black/40 border border-white/10 p-4 text-white font-mono text-sm focus:border-primary/50 focus:outline-none transition-all placeholder:text-on-surface-variant/30">
                        <span class="absolute right-4 top-1/2 -translate-y-1/2 font-mono text-[10px] text-white/20">DNS_MODE</span>
                    </div>
                </div>
                
                <button type="submit" id="submitBtn" class="w-full py-6 bg-primary text-background font-headline font-black text-sm tracking-[0.4em] hover:brightness-110 active:scale-[0.98] transition-all uppercase">
                    EXECUTE_OSINT_QUERY
                </button>
            </form>

            <!-- Loading State -->
            <div id="loading" class="hidden w-full space-y-10 py-10 animate-in fade-in duration-500">
                <div class="relative flex items-center justify-center">
                    <div class="absolute inset-0 bg-primary/10 rounded-full blur-3xl animate-pulse"></div>
                    <span class="material-symbols-outlined text-primary text-6xl animate-pulse">public</span>
                </div>
                <div class="space-y-4">
                    <p class="font-headline text-xs font-bold text-primary tracking-widest uppercase animate-pulse">
                        SCRAMBLING_PROXIES... FETCHING_MCA_DATA...
                    </p>
                    <div class="w-full bg-black/40 h-1 overflow-hidden">
                        <div class="bg-primary h-full w-1/3 animate-[loading_1.5s_infinite_ease-in-out]"></div>
                    </div>
                    <p class="text-[10px] font-mono text-on-surface-variant uppercase opacity-40">ESTIMATED_TIME: 15.0s_</p>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    @keyframes loading {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(300%); }
    }
</style>

<script>
    document.getElementById('domainForm')?.addEventListener('submit', function() {
        document.getElementById('submitBtn').classList.add('hidden');
        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('domainForm').classList.add('hidden');
    });
</script>
{% endblock %}
